<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/scripts.js" defer></script>
    <title>Quizz de Programação</title>
</head>
<body>
    
    <h1 id="main-title">Quizz de Programação</h1>
    <!--Score Board-->
    <div id="score-container" class="hide">
        <h2>Parabéns</h2>
        <p id="display-score"><span>90</span>%</p>
        <p>Você acertou <span id="correct-answers">0</span> de <span id="questions-qty">10</span> perguntas</p>
        <button id="restart">Refazer quizz!</button>
    </div>
    <!--Quizz Container-->
    <div id="quizz-container">
        <!--Questions-->
        <p id="question"><span id="question-number">1</span> - <span id="question-text"></span> </p>
        <!--Answers-->
        <div id="answers-box">
            <button><span class="btn-letter">a</span> <span class="question-answer">resposta1</span></button>

            <button><span class="btn-letter">b</span> <span class="question-answer">resposta2</span></button>

            <button><span class="btn-letter">c</span> <span class="question-answer">resposta3</span></button>

            <button><span class="btn-letter">d</span> <span class="question-answer">resposta4</span></button>
        </div>
    </div>

    <!--Template Resposta-->
    <button class="answer-template hide"><span class="btn-letter"></span> <span class="question-answer">q</span></button>

</body>
</html>
